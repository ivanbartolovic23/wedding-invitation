<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iva & Ivan - Vjenčanje 27.6.2026</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #f5f0eb;
            color: #2c2c2c;
            overflow-x: hidden;
        }

        .page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .page-1 {
            text-align: center;
        }

        .main-title {
            font-size: clamp(32px, 8vw, 64px);
            font-weight: bold;
            line-height: 1.2;
            margin-bottom: 60px;
            text-transform: uppercase;
            letter-spacing: -2px;
        }

        .couple-illustration {
            width: clamp(250px, 60vw, 400px);
            height: auto;
            margin: 40px 0;
        }

        .couple-names {
            font-size: clamp(36px, 6vw, 48px);
            font-weight: bold;
            margin: 30px 0 20px;
            text-transform: uppercase;
        }

        .wedding-date {
            font-size: clamp(18px, 4vw, 24px);
            color: #666;
            margin-bottom: 60px;
        }

        .scroll-hint {
            font-size: 14px;
            color: #999;
            margin-top: 40px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .page-2 {
            background-color: #f5f0eb;
        }

        .car-illustration {
            width: clamp(250px, 60vw, 400px);
            height: auto;
            margin-bottom: 40px;
        }

        .details-title {
            font-size: clamp(36px, 6vw, 48px);
            font-weight: bold;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        .details-content {
            max-width: 500px;
            text-align: center;
            line-height: 1.8;
        }

        .details-section {
            margin-bottom: 30px;
        }

        .details-section h3 {
            font-size: 20px;
            margin-bottom: 10px;
        }

        .details-section p {
            font-size: 16px;
            color: #666;
        }

        .page-3 {
            background-color: #fff;
        }

        .party-illustration {
            width: clamp(250px, 60vw, 400px);
            height: auto;
            margin-bottom: 40px;
        }

        .rsvp-title {
            font-size: clamp(36px, 6vw, 48px);
            font-weight: bold;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        .rsvp-form {
            width: 100%;
            max-width: 500px;
        }

        .form-group {
            margin-bottom: 25px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 16px;
            margin-bottom: 8px;
            font-weight: 500;
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #2c2c2c;
            background-color: #f5f0eb;
            font-size: 16px;
            font-family: inherit;
        }

        textarea {
            min-height: 100px;
            resize: vertical;
        }

        .guest-list {
            margin-bottom: 20px;
        }

        .guest-entry {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
        }

        .guest-entry input {
            flex: 1;
        }

        .remove-guest {
            background-color: #ff4444;
            color: white;
            border: none;
            padding: 12px 16px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
        }

        .add-guest {
            background-color: #2c2c2c;
            color: white;
            border: none;
            padding: 12px 24px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .add-guest:hover,
        .remove-guest:hover {
            opacity: 0.8;
        }

        .radio-group {
            display: flex;
            gap: 30px;
            margin-top: 10px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .radio-option input[type="radio"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .submit-btn {
            background-color: #2c2c2c;
            color: white;
            border: none;
            padding: 16px 48px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 20px;
            width: 100%;
        }

        .submit-btn:hover {
            background-color: #444;
        }

        .submit-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        .success-message {
            background-color: #4CAF50;
            color: white;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
            display: none;
        }

        .error-message {
            background-color: #ff4444;
            color: white;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
            display: none;
        }

        @media (max-width: 768px) {
            .page {
                padding: 30px 15px;
            }
        }
    </style>
</head>
<body>
    <!-- Page 1: Main Invitation -->
    <div class="page page-1">
        <div class="main-title">
            Two Less Fish<br>In The Sea
        </div>
        
        <svg class="couple-illustration" viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
            <!-- Text Arc -->
            <path id="topArc" d="M 50 80 Q 200 20 350 80" fill="none"/>
            <text font-size="32" font-weight="bold" fill="#2c2c2c">
                <textPath href="#topArc" startOffset="50%" text-anchor="middle">
                    TWO LESS FISH IN THE SEA
                </textPath>
            </text>
            
            <!-- Groom body -->
            <rect x="80" y="200" width="80" height="120" fill="#2c2c2c"/>
            <circle cx="120" cy="170" r="30" fill="#f5f0eb"/>
            <circle cx="115" cy="165" r="3" fill="#2c2c2c"/>
            <circle cx="125" cy="165" r="3" fill="#2c2c2c"/>
            <path d="M 110 180 Q 120 185 130 180" stroke="#2c2c2c" stroke-width="2" fill="none"/>
            <rect x="80" y="320" width="35" height="80" fill="#2c2c2c"/>
            <rect x="125" y="320" width="35" height="80" fill="#2c2c2c"/>
            <ellipse cx="115" cy="400" rx="18" ry="10" fill="#2c2c2c"/>
            <ellipse cx="145" cy="400" rx="18" ry="10" fill="#2c2c2c"/>
            
            <!-- Bouquet -->
            <line x1="140" y1="240" x2="175" y2="195" stroke="#2c2c2c" stroke-width="3"/>
            <circle cx="170" cy="185" r="10" fill="none" stroke="#2c2c2c" stroke-width="2"/>
            <circle cx="185" cy="190" r="10" fill="none" stroke="#2c2c2c" stroke-width="2"/>
            <circle cx="175" cy="200" r="10" fill="none" stroke="#2c2c2c" stroke-width="2"/>
            <circle cx="165" cy="195" r="8" fill="none" stroke="#2c2c2c" stroke-width="2"/>
            <circle cx="180" cy="180" r="8" fill="none" stroke="#2c2c2c" stroke-width="2"/>
            
            <!-- Bride dress -->
            <path d="M 220 200 L 220 320 L 180 400 L 300 400 L 260 320 L 260 200 Z" fill="#f5f0eb" stroke="#2c2c2c" stroke-width="2"/>
            <circle cx="240" cy="170" r="30" fill="#f5f0eb" stroke="#2c2c2c" stroke-width="2"/>
            <circle cx="235" cy="165" r="3" fill="#2c2c2c"/>
            <circle cx="245" cy="165" r="3" fill="#2c2c2c"/>
            <path d="M 230 180 Q 240 185 250 180" stroke="#2c2c2c" stroke-width="2" fill="none"/>
            
            <!-- Veil -->
            <path d="M 270 170 L 320 140 L 320 400" fill="none" stroke="#2c2c2c" stroke-width="2"/>
            <path d="M 268 180 L 315 155" stroke="#2c2c2c" stroke-width="1" fill="none"/>
            <path d="M 266 190 L 313 170" stroke="#2c2c2c" stroke-width="1" fill="none"/>
            <path d="M 264 200 L 311 185" stroke="#2c2c2c" stroke-width="1" fill="none"/>
            
            <!-- Bride shoes -->
            <ellipse cx="210" cy="400" rx="18" ry="8" fill="#2c2c2c"/>
            <ellipse cx="270" cy="400" rx="18" ry="8" fill="#2c2c2c"/>
        </svg>

        <div class="couple-names">Iva i Ivan</div>
        <div class="wedding-date">are getting married on 27.6.2026</div>
        
        <div class="scroll-hint">↓ Scroll down ↓</div>
    </div>

    <!-- Page 2: Details -->
    <div class="page page-2">
        <svg class="car-illustration" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
            <!-- Car body -->
            <rect x="80" y="150" width="240" height="70" rx="8" fill="#f5f0eb" stroke="#2c2c2c" stroke-width="3"/>
            
            <!-- Front windshield -->
            <polygon points="120,150 180,115 220,115 260,150" fill="#f5f0eb" stroke="#2c2c2c" stroke-width="3"/>
            
            <!-- Back window -->
            <polygon points="265,150 300,130 300,185 265,185" fill="#f5f0eb" stroke="#2c2c2c" stroke-width="3"/>
            
            <!-- Wheels -->
            <circle cx="130" cy="220" r="25" fill="#f5f0eb" stroke="#2c2c2c" stroke-width="3"/>
            <circle cx="130" cy="220" r="12" fill="#2c2c2c"/>
            <circle cx="270" cy="220" r="25" fill="#f5f0eb" stroke="#2c2c2c" stroke-width="3"/>
            <circle cx="270" cy="220" r="12" fill="#2c2c2c"/>
            
            <!-- Groom head -->
            <circle cx="150" cy="160" r="18" fill="#2c2c2c"/>
            
            <!-- Bride head -->
            <circle cx="230" cy="160" r="18" fill="#f5f0eb" stroke="#2c2c2c" stroke-width="2"/>
            
            <!-- Veil flowing -->
            <path d="M 240 150 Q 265 135 275 125 L 275 210" stroke="#2c2c2c" stroke-width="2" fill="none"/>
            <path d="M 242 158 Q 260 148 270 142" stroke="#2c2c2c" stroke-width="1" fill="none"/>
            <path d="M 243 166 Q 258 160 268 156" stroke="#2c2c2c" stroke-width="1" fill="none"/>
            <path d="M 244 174 Q 256 172 266 170" stroke="#2c2c2c" stroke-width="1" fill="none"/>
            
            <!-- Cans behind car -->
            <ellipse cx="325" cy="210" rx="8" ry="12" fill="none" stroke="#2c2c2c" stroke-width="2"/>
            <line x1="320" y1="205" x2="330" y2="215" stroke="#2c2c2c" stroke-width="1"/>
            <line x1="322" y1="210" x2="328" y2="210" stroke="#2c2c2c" stroke-width="1"/>
            
            <ellipse cx="345" cy="215" rx="7" ry="11" fill="none" stroke="#2c2c2c" stroke-width="2"/>
            <line x1="341" y1="210" x2="349" y2="220" stroke="#2c2c2c" stroke-width="1"/>
            <line x1="343" y1="215" x2="347" y2="215" stroke="#2c2c2c" stroke-width="1"/>
            
            <!-- String connecting cans to car -->
            <line x1="315" y1="210" x2="80" y2="195" stroke="#2c2c2c" stroke-width="1" stroke-dasharray="4,4"/>
        </svg>

        <div class="details-title">DETAILS</div>

        <div class="details-content">
            <div class="details-section">
                <h3>📅 Datum</h3>
                <p>27.6.2026.</p>
            </div>

            <div class="details-section">
                <h3>🕐 Okupljanje</h3>
                <p>18:00 - Ranch Kurilovec</p>
            </div>

            <div class="details-section">
                <h3>💍 Obred</h3>
                <p>19:30</p>
            </div>

            <div class="details-section">
                <h3>🍽️ Večera</h3>
                <p>20:00</p>
            </div>
        </div>
    </div>

    <!-- Page 3: RSVP Form -->
    <div class="page page-3">
        <svg class="party-illustration" viewBox="0 0 400 250" xmlns="http://www.w3.org/2000/svg">
            <!-- Text Arc -->
            <path id="partyArc" d="M 100 30 Q 200 10 300 30" fill="none"/>
            <text font-size="36" font-weight="bold" fill="#2c2c2c">
                <textPath href="#partyArc" startOffset="50%" text-anchor="middle">
                    PARTY ON!
                </textPath>
            </text>
            
            <!-- Left arm -->
            <rect x="30" y="150" width="80" height="20" rx="10" fill="#f5f0eb" stroke="#2c2c2c" stroke-width="2"/>
            <ellipse cx="35" cy="160" rx="12" ry="15" fill="#f5f0eb" stroke="#2c2c2c" stroke-width="2"/>
            
            <!-- Left glass stem -->
            <circle cx="85" cy="145" r="8" fill="none" stroke="#2c2c2c" stroke-width="2"/>
            <line x1="85" y1="137" x2="85" y2="90" stroke="#2c2c2c" stroke-width="3"/>
            
            <!-- Left glass bowl -->
            <ellipse cx="85" cy="85" rx="35" ry="12" fill="none" stroke="#2c2c2c" stroke-width="3"/>
            <path d="M 50 85 Q 50 62 85 62 Q 120 62 120 85" fill="none" stroke="#2c2c2c" stroke-width="3"/>
            
            <!-- Champagne in left glass -->
            <ellipse cx="85" cy="75" rx="28" ry="8" fill="#f5f0eb" stroke="#2c2c2c" stroke-width="1"/>
            <line x1="60" y1="75" x2="63" y2="82" stroke="#2c2c2c" stroke-width="1"/>
            <line x1="70" y1="72" x2="72" y2="82" stroke="#2c2c2c" stroke-width="1"/>
            <line x1="80" y1="70" x2="81" y2="82" stroke="#2c2c2c" stroke-width="1"/>
            
            <!-- Right arm -->
            <rect x="290" y="150" width="80" height="20" rx="10" fill="#f5f0eb" stroke="#2c2c2c" stroke-width="2"/>
            <ellipse cx="365" cy="160" rx="12" ry="15" fill="#f5f0eb" stroke="#2c2c2c" stroke-width="2"/>
            
            <!-- Right glass stem -->
            <circle cx="315" cy="145" r="8" fill="none" stroke="#2c2c2c" stroke-width="2"/>
            <line x1="315" y1="137" x2="315" y2="90" stroke="#2c2c2c" stroke-width="3"/>
            
            <!-- Right glass bowl -->
            <ellipse cx="315" cy="85" rx="35" ry="12" fill="none" stroke="#2c2c2c" stroke-width="3"/>
            <path d="M 280 85 Q 280 62 315 62 Q 350 62 350 85" fill="none" stroke="#2c2c2c" stroke-width="3"/>
            
            <!-- Champagne in right glass -->
            <ellipse cx="315" cy="75" rx="28" ry="8" fill="#f5f0eb" stroke="#2c2c2c" stroke-width="1"/>
            <line x1="290" y1="75" x2="293" y2="82" stroke="#2c2c2c" stroke-width="1"/>
            <line x1="300" y1="72" x2="302" y2="82" stroke="#2c2c2c" stroke-width="1"/>
            <line x1="310" y1="70" x2="311" y2="82" stroke="#2c2c2c" stroke-width="1"/>
            
            <!-- Ring on left hand -->
            <circle cx="50" cy="160" r="5" fill="none" stroke="#2c2c2c" stroke-width="2"/>
            <circle cx="50" cy="160" r="3" fill="none" stroke="#2c2c2c" stroke-width="1"/>
        </svg>

        <div class="rsvp-title">RSVP</div>

        <div class="success-message" id="successMessage">
            Hvala! Vaš odgovor je uspješno poslan. 🎉
        </div>
        <div class="error-message" id="errorMessage">
            Došlo je do greške. Molimo pokušajte ponovo.
        </div>

        <form class="rsvp-form" id="rsvpForm">
            <div class="form-group">
                <label>Hoćete li doći?</label>
                <div class="radio-group">
                    <label class="radio-option">
                        <input type="radio" name="attending" value="yes" required>
                        <span>Da, dolazim!</span>
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="attending" value="no" required>
                        <span>Ne mogu doći</span>
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label>Imena gostiju</label>
                <div class="guest-list" id="guestList">
                    <div class="guest-entry">
                        <input type="text" name="guest[]" placeholder="Ime i prezime" required>
                    </div>
                </div>
                <button type="button" class="add-guest" onclick="addGuest()">+ Dodaj gosta</button>
            </div>

            <div class="form-group">
                <label>Dodatne informacije (alergije, komentari)</label>
                <textarea name="notes" placeholder="Vaše napomene..."></textarea>
            </div>

            <button type="submit" class="submit-btn">Pošalji odgovor</button>
        </form>
    </div>

    <script>
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyIkLFVZIqH8iUTGwpfG_eMsF6aCCdDldsUUv_ah9L0BeQ5ds2JLA2RJCOEo0zEx3zE/exec';

        function addGuest() {
            const guestList = document.getElementById('guestList');
            const guestEntry = document.createElement('div');
            guestEntry.className = 'guest-entry';
            guestEntry.innerHTML = `
                <input type="text" name="guest[]" placeholder="Ime i prezime" required>
                <button type="button" class="remove-guest" onclick="removeGuest(this)">−</button>
            `;
            guestList.appendChild(guestEntry);
        }

        function removeGuest(button) {
            button.parentElement.remove();
        }

        document.getElementById('rsvpForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const submitBtn = this.querySelector('.submit-btn');
            const successMsg = document.getElementById('successMessage');
            const errorMsg = document.getElementById('errorMessage');
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'Šaljem...';
            successMsg.style.display = 'none';
            errorMsg.style.display = 'none';

            const formData = new FormData(this);
            const attending = formData.get('attending');
            const guests = formData.getAll('guest[]').filter(g => g.trim() !== '');
            const notes = formData.get('notes');

            const data = {
                attending: attending === 'yes' ? 'Da' : 'Ne',
                guests: guests.join(', '),
                guestCount: guests.length,
                notes: notes,
                timestamp: new Date().toLocaleString('hr-HR')
            };

            try {
                const response = await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });

                successMsg.style.display = 'block';
                this.reset();
                successMsg.scrollIntoView({ behavior: 'smooth', block: 'center' });
                
            } catch (error) {
                console.error('Error:', error);
                errorMsg.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Pošalji odgovor';
            }
        });
    </script>
</body>
</html>
