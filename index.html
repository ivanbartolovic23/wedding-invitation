<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iva & Ivan - Vjenčanje 27.6.2026</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Quicksand:wght@300;400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #f5f0eb;
            color: #2c2c2c;
            overflow-x: hidden;
            overflow-y: auto;
        }

        .container {
            position: relative;
            transition: transform 0.8s ease-in-out;
        }

        .container.slide-up {
            transform: translateY(-100vh);
        }

        .page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .page-1 {
            padding: 0;
            cursor: pointer;
            background-color: #f5f0eb;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .page-1 img {
            max-width: 100%;
            max-height: 100vh;
            width: auto;
            height: auto;
            object-fit: contain;
        }

        .main-title {
            font-family: 'Caveat', cursive;
            font-size: clamp(28px, 7vw, 56px);
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: 40px;
            letter-spacing: 1px;
        }

        .couple-illustration {
            width: clamp(250px, 60vw, 400px);
            height: auto;
            margin: 40px 0;
        }

        .couple-names {
            font-family: 'Caveat', cursive;
            font-size: clamp(36px, 8vw, 56px);
            font-weight: 700;
            margin: 20px 0 10px;
            letter-spacing: 1px;
        }

        .wedding-date {
            font-size: clamp(16px, 3.5vw, 20px);
            color: #2c2c2c;
            margin-bottom: 15px;
            line-height: 1.8;
        }

        .wedding-date strong {
            font-size: clamp(22px, 5vw, 32px);
            font-weight: 700;
            display: block;
            margin: 15px 0;
        }

        .scroll-hint {
            font-size: 14px;
            color: #666;
            margin-top: 30px;
            animation: bounce 2s infinite;
            font-style: italic;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .page-2 {
            background-color: #f5f0eb;
        }

        .car-illustration {
            width: clamp(250px, 60vw, 400px);
            height: auto;
            margin-bottom: 40px;
        }

        .details-title {
            font-family: 'Caveat', cursive;
            font-size: clamp(32px, 6vw, 44px);
            font-weight: 700;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        .details-content {
            max-width: 500px;
            text-align: center;
            line-height: 1.8;
        }

        .details-section {
            margin-bottom: 30px;
        }

        .details-section h3 {
            font-size: 20px;
            margin-bottom: 10px;
        }

        .details-section p {
            font-size: 16px;
            color: #666;
        }

        .page-3 {
            background-color: #fff;
        }

        .party-illustration {
            width: clamp(250px, 60vw, 400px);
            height: auto;
            margin-bottom: 40px;
        }

        .rsvp-title {
            font-family: 'Caveat', cursive;
            font-size: clamp(32px, 6vw, 44px);
            font-weight: 700;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        .rsvp-form {
            width: 100%;
            max-width: 500px;
        }

        .form-group {
            margin-bottom: 25px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 16px;
            margin-bottom: 8px;
            font-weight: 500;
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #2c2c2c;
            background-color: #f5f0eb;
            font-size: 16px;
            font-family: inherit;
        }

        textarea {
            min-height: 100px;
            resize: vertical;
        }

        .guest-list {
            margin-bottom: 20px;
        }

        .guest-entry {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
        }

        .guest-entry input {
            flex: 1;
        }

        .remove-guest {
            background-color: #ff4444;
            color: white;
            border: none;
            padding: 12px 16px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
        }

        .add-guest {
            background-color: #2c2c2c;
            color: white;
            border: none;
            padding: 12px 24px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .add-guest:hover,
        .remove-guest:hover {
            opacity: 0.8;
        }

        .radio-group {
            display: flex;
            gap: 30px;
            margin-top: 10px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .radio-option input[type="radio"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .submit-btn {
            background-color: #2c2c2c;
            color: white;
            border: none;
            padding: 16px 48px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 20px;
            width: 100%;
        }

        .submit-btn:hover {
            background-color: #444;
        }

        .submit-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        .success-message {
            background-color: #4CAF50;
            color: white;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
            display: none;
        }

        .error-message {
            background-color: #ff4444;
            color: white;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
            display: none;
        }

        @media (max-width: 768px) {
            .page {
                padding: 30px 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container" id="mainContainer">
        <!-- Page 1: Main Invitation -->
        <div class="page page-1" id="page1" onclick="slideToNextPage()">
            <img id="mainImage" src="pozivnica_front.jpeg" alt="Iva i Ivan - Vjenčanje 27.6.2026">
        </div>

        <!-- Page 2: Details -->
        <div class="page page-2">
        <svg class="car-illustration" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
            <!-- Car body -->
            <rect x="80" y="150" width="240" height="70" rx="8" fill="#f5f0eb" stroke="#2c2c2c" stroke-width="3"/>
            
            <!-- Front windshield -->
            <polygon points="120,150 180,115 220,115 260,150" fill="#f5f0eb" stroke="#2c2c2c" stroke-width="3"/>
            
            <!-- Back window -->
            <polygon points="265,150 300,130 300,185 265,185" fill="#f5f0eb" stroke="#2c2c2c" stroke-width="3"/>
            
            <!-- Wheels -->
            <circle cx="130" cy="220" r="25" fill="#f5f0eb" stroke="#2c2c2c" stroke-width="3"/>
            <circle cx="130" cy="220" r="12" fill="#2c2c2c"/>
            <circle cx="270" cy="220" r="25" fill="#f5f0eb" stroke="#2c2c2c" stroke-width="3"/>
            <circle cx="270" cy="220" r="12" fill="#2c2c2c"/>
            
            <!-- Groom head -->
            <circle cx="150" cy="160" r="18" fill="#2c2c2c"/>
            
            <!-- Bride head -->
            <circle cx="230" cy="160" r="18" fill="#f5f0eb" stroke="#2c2c2c" stroke-width="2"/>
            
            <!-- Veil flowing -->
            <path d="M 240 150 Q 265 135 275 125 L 275 210" stroke="#2c2c2c" stroke-width="2" fill="none"/>
            <path d="M 242 158 Q 260 148 270 142" stroke="#2c2c2c" stroke-width="1" fill="none"/>
            <path d="M 243 166 Q 258 160 268 156" stroke="#2c2c2c" stroke-width="1" fill="none"/>
            <path d="M 244 174 Q 256 172 266 170" stroke="#2c2c2c" stroke-width="1" fill="none"/>
            
            <!-- Cans behind car -->
            <ellipse cx="325" cy="210" rx="8" ry="12" fill="none" stroke="#2c2c2c" stroke-width="2"/>
            <line x1="320" y1="205" x2="330" y2="215" stroke="#2c2c2c" stroke-width="1"/>
            <line x1="322" y1="210" x2="328" y2="210" stroke="#2c2c2c" stroke-width="1"/>
            
            <ellipse cx="345" cy="215" rx="7" ry="11" fill="none" stroke="#2c2c2c" stroke-width="2"/>
            <line x1="341" y1="210" x2="349" y2="220" stroke="#2c2c2c" stroke-width="1"/>
            <line x1="343" y1="215" x2="347" y2="215" stroke="#2c2c2c" stroke-width="1"/>
            
            <!-- String connecting cans to car -->
            <line x1="315" y1="210" x2="80" y2="195" stroke="#2c2c2c" stroke-width="1" stroke-dasharray="4,4"/>
        </svg>

        <div class="details-title">DETALJI</div>

        <div class="details-content">
            <div class="details-section">
                <h3>📅 Datum</h3>
                <p>27.6.2026.</p>
            </div>

            <div class="details-section">
                <h3>🥂 Okupljanje & piće dobrodošlice</h3>
                <p>18:00</p>
            </div>

            <div class="details-section">
                <h3>💍 Ceremonija</h3>
                <p>19:00</p>
            </div>

            <div class="details-section">
                <h3>🍽️ Večera, ples i party mode ON!</h3>
                <p>20:00</p>
            </div>
        </div>
    </div>

        <!-- Page 3: RSVP Form -->
        <div class="page page-3">
        <svg class="party-illustration" viewBox="0 0 400 250" xmlns="http://www.w3.org/2000/svg">
            <!-- Text Arc -->
            <path id="partyArc" d="M 100 30 Q 200 10 300 30" fill="none"/>
            <text font-size="36" font-weight="bold" fill="#2c2c2c">
                <textPath href="#partyArc" startOffset="50%" text-anchor="middle">
                    PARTY ON!
                </textPath>
            </text>
            
            <!-- Left arm -->
            <rect x="30" y="150" width="80" height="20" rx="10" fill="#f5f0eb" stroke="#2c2c2c" stroke-width="2"/>
            <ellipse cx="35" cy="160" rx="12" ry="15" fill="#f5f0eb" stroke="#2c2c2c" stroke-width="2"/>
            
            <!-- Left glass stem -->
            <circle cx="85" cy="145" r="8" fill="none" stroke="#2c2c2c" stroke-width="2"/>
            <line x1="85" y1="137" x2="85" y2="90" stroke="#2c2c2c" stroke-width="3"/>
            
            <!-- Left glass bowl -->
            <ellipse cx="85" cy="85" rx="35" ry="12" fill="none" stroke="#2c2c2c" stroke-width="3"/>
            <path d="M 50 85 Q 50 62 85 62 Q 120 62 120 85" fill="none" stroke="#2c2c2c" stroke-width="3"/>
            
            <!-- Champagne in left glass -->
            <ellipse cx="85" cy="75" rx="28" ry="8" fill="#f5f0eb" stroke="#2c2c2c" stroke-width="1"/>
            <line x1="60" y1="75" x2="63" y2="82" stroke="#2c2c2c" stroke-width="1"/>
            <line x1="70" y1="72" x2="72" y2="82" stroke="#2c2c2c" stroke-width="1"/>
            <line x1="80" y1="70" x2="81" y2="82" stroke="#2c2c2c" stroke-width="1"/>
            
            <!-- Right arm -->
            <rect x="290" y="150" width="80" height="20" rx="10" fill="#f5f0eb" stroke="#2c2c2c" stroke-width="2"/>
            <ellipse cx="365" cy="160" rx="12" ry="15" fill="#f5f0eb" stroke="#2c2c2c" stroke-width="2"/>
            
            <!-- Right glass stem -->
            <circle cx="315" cy="145" r="8" fill="none" stroke="#2c2c2c" stroke-width="2"/>
            <line x1="315" y1="137" x2="315" y2="90" stroke="#2c2c2c" stroke-width="3"/>
            
            <!-- Right glass bowl -->
            <ellipse cx="315" cy="85" rx="35" ry="12" fill="none" stroke="#2c2c2c" stroke-width="3"/>
            <path d="M 280 85 Q 280 62 315 62 Q 350 62 350 85" fill="none" stroke="#2c2c2c" stroke-width="3"/>
            
            <!-- Champagne in right glass -->
            <ellipse cx="315" cy="75" rx="28" ry="8" fill="#f5f0eb" stroke="#2c2c2c" stroke-width="1"/>
            <line x1="290" y1="75" x2="293" y2="82" stroke="#2c2c2c" stroke-width="1"/>
            <line x1="300" y1="72" x2="302" y2="82" stroke="#2c2c2c" stroke-width="1"/>
            <line x1="310" y1="70" x2="311" y2="82" stroke="#2c2c2c" stroke-width="1"/>
            
            <!-- Ring on left hand -->
            <circle cx="50" cy="160" r="5" fill="none" stroke="#2c2c2c" stroke-width="2"/>
            <circle cx="50" cy="160" r="3" fill="none" stroke="#2c2c2c" stroke-width="1"/>
        </svg>

        <div class="rsvp-title">PARTY ON?</div>

        <div class="success-message" id="successMessage">
            Hvala! Vaš odgovor je uspješno poslan. 🎉
        </div>
        <div class="error-message" id="errorMessage">
            Došlo je do greške. Molimo pokušajte ponovo.
        </div>

        <form class="rsvp-form" id="rsvpForm">
            <div class="form-group">
                <label>Ljubazno vas molimo da potvrdite svoj dolazak:</label>
                <div class="radio-group">
                    <label class="radio-option">
                        <input type="radio" name="attending" value="yes" required>
                        <span>Da, dolazim!</span>
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="attending" value="no" required>
                        <span>Nažalost, ne mogu doći.</span>
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label>Odaberite meni:</label>
                <div class="radio-group" style="flex-direction: column; gap: 12px;">
                    <label class="radio-option">
                        <input type="radio" name="menu" value="obicni" required>
                        <span>1. Obični</span>
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="menu" value="vegetarijanski" required>
                        <span>2. Vegetarijanski</span>
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="menu" value="veganski" required>
                        <span>3. Veganski</span>
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="menu" value="gluten-free" required>
                        <span>4. Gluten free</span>
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="menu" value="ostalo" required id="menuOstalo">
                        <span>5. Ostalo (molim navesti alergije):</span>
                    </label>
                </div>
                <input type="text" name="menuOther" id="menuOtherInput" placeholder="Navedite alergije ili posebne zahtjeve" style="margin-top: 10px; display: none;">
            </div>

            <div class="form-group">
                <label>Imena gostiju</label>
                <div class="guest-list" id="guestList">
                    <div class="guest-entry">
                        <input type="text" name="guest[]" placeholder="Ime i prezime" required>
                    </div>
                </div>
                <button type="button" class="add-guest" onclick="addGuest()">+ Dodaj gosta</button>
            </div>

            <button type="submit" class="submit-btn">Pošalji odgovor</button>
        </form>
    </div>

    </div>

    <script src="image-data.js"></script>
    <script>
        if (typeof imageData !== 'undefined') {
            document.getElementById('mainImage').src = imageData;
        }
        function slideToNextPage() {
            const container = document.getElementById('mainContainer');
            container.classList.add('slide-up');
        }

        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyIkLFVZIqH8iUTGwpfG_eMsF6aCCdDldsUUv_ah9L0BeQ5ds2JLA2RJCOEo0zEx3zE/exec';

        function addGuest() {
            const guestList = document.getElementById('guestList');
            const guestEntry = document.createElement('div');
            guestEntry.className = 'guest-entry';
            guestEntry.innerHTML = `
                <input type="text" name="guest[]" placeholder="Ime i prezime" required>
                <button type="button" class="remove-guest" onclick="removeGuest(this)">−</button>
            `;
            guestList.appendChild(guestEntry);
        }

        function removeGuest(button) {
            button.parentElement.remove();
        }

        document.getElementById('rsvpForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const submitBtn = this.querySelector('.submit-btn');
            const successMsg = document.getElementById('successMessage');
            const errorMsg = document.getElementById('errorMessage');
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'Šaljem...';
            successMsg.style.display = 'none';
            errorMsg.style.display = 'none';

            const formData = new FormData(this);
            const attending = formData.get('attending');
            const menu = formData.get('menu');
            const menuOther = formData.get('menuOther');
            const guests = formData.getAll('guest[]').filter(g => g.trim() !== '');

            const menuText = menu === 'ostalo' ? `Ostalo: ${menuOther}` : menu;

            const data = {
                attending: attending === 'yes' ? 'Da' : 'Ne',
                menu: menuText,
                guests: guests.join(', '),
                guestCount: guests.length,
                timestamp: new Date().toLocaleString('hr-HR')
            };

            try {
                const response = await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });

                successMsg.style.display = 'block';
                this.reset();
                successMsg.scrollIntoView({ behavior: 'smooth', block: 'center' });
                
            } catch (error) {
                console.error('Error:', error);
                errorMsg.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Pošalji odgovor';
            }
        });

        // Show/hide menu other input
        document.querySelectorAll('input[name="menu"]').forEach(radio => {
            radio.addEventListener('change', function() {
                const otherInput = document.getElementById('menuOtherInput');
                if (this.value === 'ostalo') {
                    otherInput.style.display = 'block';
                    otherInput.required = true;
                } else {
                    otherInput.style.display = 'none';
                    otherInput.required = false;
                    otherInput.value = '';
                }
            });
        });
    </script>
</body>
</html>
